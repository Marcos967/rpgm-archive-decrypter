name: Build for Termux ARM64

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Build
        run: |
          # O GitHub Actions já tem o NDK em $ANDROID_NDK_LATEST_HOME
          # Vamos usar o script 'cargo-ndk' para facilitar a vida
          cargo install cargo-ndk
          cargo ndk -t aarch64-linux-android build --release

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: decrypter-termux-arm64
          path: target/aarch64-linux-android/release/rpgmad
